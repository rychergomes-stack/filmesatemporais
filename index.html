<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filmes Atemporais</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Poppins',sans-serif; background:#0b0b0b; color:#fff; }
header { padding:20px 40px; background:#000; position:sticky; top:0; z-index:10; }
header h1 { color:#e50914; margin:0; }

.banner {
  height:70vh;
  background:linear-gradient(to top,#000,transparent), url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba') center/cover;
}

.section { padding:20px 40px; }
.section h3 { margin-bottom:10px; }

.scroll { display:flex; overflow-x:auto; gap:15px; }
.scroll::-webkit-scrollbar { height:6px; }
.scroll::-webkit-scrollbar-thumb { background:#e50914; }

.card {
  min-width:180px;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
  transition:0.3s;
}

.card img { width:100%; height:260px; object-fit:cover; }

.card:hover {
  transform:scale(1.15);
  z-index:5;
}

.overlay {
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:linear-gradient(to top,#000,transparent);
  padding:10px;
  opacity:0;
  transition:0.3s;
}

.card:hover .overlay {
  opacity:1;
}

.overlay p { margin:0; font-size:0.9rem; }

.filme-detalhe { display:none; padding:40px; }
.filme-detalhe iframe { width:100%; max-width:800px; height:450px; margin-top:20px; }
.voltar { color:#e50914; cursor:pointer; margin-top:20px; display:block; }

</style>
</head>
<body>

<header>
  <h1>Filmes Atemporais</h1>
</header>

<div id="home">
  <div class="banner"></div>

  <div class="section">
    <h3>🔥 Populares</h3>
    <div class="scroll">

      <div class="card" onclick="abrirFilme('matrix')">
        <img src="https://m.media-amazon.com/images/I/51EG732BV3L.jpg">
        <div class="overlay"><p>Matrix (1999)</p></div>
      </div>

      <div class="card" onclick="abrirFilme('titanic')">
        <img src="https://m.media-amazon.com/images/I/51NiGlapXlL._AC_.jpg">
        <div class="overlay"><p>Titanic (1997)</p></div>
      </div>

      <div class="card" onclick="abrirFilme('forrest')">
        <img src="https://m.media-amazon.com/images/I/61+2X8U9HLL._AC_SY679_.jpg">
        <div class="overlay"><p>Forrest Gump (1994)</p></div>
      </div>

    </div>
  </div>

</div>

<div id="matrix" class="filme-detalhe">
  <h2>Matrix</h2>
  <iframe src="https://www.youtube.com/embed/vKQi3bBA1y8" allowfullscreen></iframe>
  <span class="voltar" onclick="voltarHome()">⬅ Voltar</span>
</div>

<div id="titanic" class="filme-detalhe">
  <h2>Titanic</h2>
  <iframe src="https://www.youtube.com/embed/kVrqfYjkTdQ" allowfullscreen></iframe>
  <span class="voltar" onclick="voltarHome()">⬅ Voltar</span>
</div>

<div id="forrest" class="filme-detalhe">
  <h2>Forrest Gump</h2>
  <iframe src="https://www.youtube.com/embed/bLvqoHBptjg" allowfullscreen></iframe>
  <span class="voltar" onclick="voltarHome()">⬅ Voltar</span>
</div>

<script>
function abrirFilme(id){
  document.getElementById('home').style.display='none';
  document.querySelectorAll('.filme-detalhe').forEach(el=>el.style.display='none');
  document.getElementById(id).style.display='block';
}

function voltarHome(){
  document.getElementById('home').style.display='block';
  document.querySelectorAll('.filme-detalhe').forEach(el=>el.style.display='none');
}
</script>

</body>
</html>
