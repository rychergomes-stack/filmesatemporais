<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filmes Atemporais</title>

<style>
body { margin:0; background:#0b0b0b; color:#fff; font-family:Arial; }
header { padding:20px; background:#000; }
h1 { color:#e50914; }

.container { padding:20px; }
.scroll { display:flex; overflow-x:auto; gap:15px; }

.card {
  min-width:180px;
  cursor:pointer;
  transition:0.3s;
}

.card:hover { transform:scale(1.1); }

.card img {
  width:100%;
  height:250px;
  object-fit:cover;
}

#detalhe { display:none; padding:20px; }
iframe { width:100%; max-width:800px; height:450px; }
.voltar { color:#e50914; cursor:pointer; display:block; margin-top:20px; }
</style>
</head>

<body>

<header>
<h1>Filmes Atemporais</h1>
</header>

<div class="container">
<div class="scroll" id="lista"></div>
</div>

<div id="detalhe"></div>

<script>

const filmes = [
{
nome: "O Poderoso Chefão (1972)",
img: "https://m.media-amazon.com/images/I/41--5rK7a0L._AC_.jpg",
desc: "A história da poderosa família mafiosa Corleone.",
trailer: ""
},
{
nome: "O Massacre da Serra Elétrica (1974)",
img: "https://m.media-amazon.com/images/I/51p6XQYJ1LL._AC_.jpg",
desc: "Um grupo de jovens encontra uma família de canibais.",
trailer: ""
},
{
nome: "Três Homens em Conflito (1966)",
img: "https://m.media-amazon.com/images/I/51l5-0n5xPL._AC_.jpg",
desc: "Três pistoleiros em busca de um tesouro durante a guerra.",
trailer: ""
},
{
nome: "Rocky: Um Lutador (1976)",
img: "https://m.media-amazon.com/images/I/51v5ZpFyaFL._AC_.jpg",
desc: "Um boxeador desconhecido ganha uma chance pelo título.",
trailer: ""
},
{
nome: "O Exterminador do Futuro (1984)",
img: "https://m.media-amazon.com/images/I/51jNORv6nQL._AC_.jpg",
desc: "Um ciborgue é enviado do futuro para matar Sarah Connor.",
trailer: ""
},
{
nome: "Star Wars: Uma Nova Esperança (1977)",
img: "https://m.media-amazon.com/images/I/81aA7hEEykL._AC_SY679_.jpg",
desc: "A luta da Aliança Rebelde contra o Império Galáctico.",
trailer: ""
},
{
nome: "Sexta-Feira 13 (1980)",
img: "https://m.media-amazon.com/images/I/51P0h7+N7zL._AC_.jpg",
desc: "Jovens são perseguidos por um assassino em um acampamento.",
trailer: ""
}
];

const lista = document.getElementById("lista");

filmes.forEach((f, i) => {
  lista.innerHTML += `
    <div class="card" onclick="abrir(${i})">
      <img src="${f.img}">
      <p>${f.nome}</p>
    </div>
  `;
});

function abrir(i){
  document.querySelector(".container").style.display="none";
  const f = filmes[i];

  document.getElementById("detalhe").innerHTML = `
    <h2>${f.nome}</h2>
    <p>${f.desc}</p>
    ${f.trailer ? `<iframe src="${f.trailer}" allowfullscreen></iframe>` : `<p><i>Trailer não adicionado ainda</i></p>`}
    <span class="voltar" onclick="voltar()">⬅ Voltar</span>
  `;

  document.getElementById("detalhe").style.display="block";
}

function voltar(){
  document.querySelector(".container").style.display="block";
  document.getElementById("detalhe").style.display="none";
}

</script>

</body>
</html>
